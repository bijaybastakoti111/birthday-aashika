<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>
body{margin:0;font-family:"Segoe UI",sans-serif;color:#fff;overflow-x:hidden;text-align:center;
background: radial-gradient(circle at top, rgba(26,26,46,.85), rgba(15,15,26,.95)), url('photo1.png') center/cover no-repeat fixed;}
.container{max-width:900px;margin:auto;padding:40px 20px}
h1{font-size:48px;margin-top:30px}
.name{color:#ff6b9a;font-size:28px}
.message{font-size:20px;margin-top:20px;min-height:80px}
button{margin-top:20px;padding:12px 26px;border:none;border-radius:30px;background:#ff4b7d;color:#fff;cursor:pointer;box-shadow:0 6px 16px rgba(0,0,0,.35)}
button:hover{background:#e63b6a}

/* intro overlay */
.intro{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:30}
.intro.hidden{display:none}
.intro .box{background:#111;padding:24px 28px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.6)}

/* bulbs */
.bulbs{position:fixed;top:0;width:100%;display:flex;justify-content:space-around;padding:10px;z-index:10}
.bulb{width:12px;height:20px;background:#333;border-radius:50%;transition:.3s}
.bulb.on{background:yellow;box-shadow:0 0 18px yellow,0 0 36px yellow}

/* chat */
.chat{background:#1f1f2e;border-radius:14px;padding:14px;margin-top:16px;text-align:left}
.chat p{background:#ff4b7d;padding:10px 12px;border-radius:12px;margin:6px 0;width:fit-content}

/* gate */
.gate{display:flex;justify-content:center;gap:10px;margin-top:24px;perspective:1000px}
.door{width:140px;height:200px;background:#8b4513;border-radius:10px;transition:1.5s}
.left{transform-origin:left}.right{transform-origin:right}
.left.open{transform:rotateY(-120deg)}.right.open{transform:rotateY(120deg)}

video{width:100%;max-height:320px;object-fit:contain;border-radius:12px;margin-top:16px}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-top:16px}
.gallery img{width:100%;border-radius:10px}
.hidden{display:none}

/* confetti */
.confetti div{position:absolute;width:6px;height:6px;animation:fall 3s linear infinite}
@keyframes fall{0%{transform:translateY(-10vh)}100%{transform:translateY(110vh)}}

/* ending */
.ending{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:25}
.ending.hidden{display:none}
.ending .card{background:#111;padding:26px 30px;border-radius:16px}

</style>
</head>

<body>

<!-- intro -->
<div id="intro" class="intro">
  <div class="box">
    <h2>A small surprise for you ✨</h2>
    <button onclick="startExperience()">Start</button>
  </div>
</div>

<div class="bulbs" id="bulbs">
  <div class="bulb"></div><div class="bulb"></div><div class="bulb"></div><div class="bulb"></div><div class="bulb"></div>
</div>

<div class="container">
<h1>🎉 Happy Birthday 🎂</h1>
<h2 class="name">Aashika</h2>
<div class="message" id="typing"></div>

<button onclick="turnOnLight()">Turn on the Light ✨</button>

<div id="chat" class="chat hidden"></div>

<div id="gateSection" class="hidden">
  <div class="gate">
    <div class="door left" id="leftDoor"></div>
    <div class="door right" id="rightDoor"></div>
  </div>
  <button onclick="openGate()">Open Surprise 🚪</button>
</div>

<div id="videoSection" class="hidden">
  <video controls>
    <source src="video.mp4" type="video/mp4">
  </video>
  <button onclick="showMore()">Go deeper</button>
</div>

<div id="finalSection" class="hidden">
  <div class="gallery">
    <img src="photo1.png"><img src="photo2.png"><img src="photo3.png">
  </div>
  <p id="finalText"></p>
  <button onclick="showEnding()">One last thing </button>
</div>

</div>

<!-- ending -->
<div id="ending" class="ending hidden">
  <div class="card">
    <h2>Made for you❤️ </h2>
    <p>I hope this made you smile today 😊</p>
  </div>
</div>

<audio id="music">
  <source src="happy-birthday.mp3" type="audio/mpeg">
</audio>

<script>
function startExperience(){ document.getElementById('intro').classList.add('hidden'); }

// typing
const text="You have such a beautiful heart, strong mind, and inspiring spirit❤️.";
let i=0;function type(){if(i<text.length){typing.innerHTML+=text[i];i++;setTimeout(type,40)}};type();

function turnOnLight(){
  let bulbs=document.querySelectorAll('.bulb');
  bulbs.forEach((b,i)=>setTimeout(()=>b.classList.add('on'),i*150));
  document.getElementById('music').play();
  setTimeout(showChat,1000);
}

function showChat(){
  let chat=document.getElementById('chat');
  chat.classList.remove('hidden');
  let msgs=["Hey 😊","I’m really glad we met","You have a beautiful heart","Today is all about you 🎂"];
  let k=0;function next(){if(k<msgs.length){let p=document.createElement('p');p.innerText=msgs[k];chat.appendChild(p);k++;setTimeout(next,800)}else{gateSection.classList.remove('hidden')}}
  next();
}

function openGate(){
  leftDoor.classList.add('open'); rightDoor.classList.add('open'); createConfetti();
  setTimeout(()=>videoSection.classList.remove('hidden'),900);
}

function showMore(){ finalSection.classList.remove('hidden'); typeFinal(); }

function createConfetti(){ for(let i=0;i<70;i++){ let d=document.createElement('div'); d.style.left=Math.random()*100+'%'; d.style.background=['red','yellow','pink'][Math.floor(Math.random()*3)]; document.body.appendChild(d);} }

const finalMsg="May your life always be filled with happiness, growth, and beautiful moments.";
let j=0;function typeFinal(){ if(j<finalMsg.length){ finalText.innerHTML+=finalMsg[j]; j++; setTimeout(typeFinal,30);} }

function showEnding(){ document.getElementById('ending').classList.remove('hidden'); }
</script>

</body>
</html>
