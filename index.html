<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>

body{
margin:0;
font-family:"Segoe UI",sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
overflow-x:hidden;
text-align:center;
color:#333;
}

.container{
max-width:800px;
margin:auto;
padding:40px 20px;
}

h1{
font-size:50px;
margin-top:40px;
}

.name{
color:#ff2e63;
font-weight:bold;
}

.message{
font-size:20px;
margin-top:20px;
min-height:80px;
}

button{
margin-top:25px;
padding:14px 30px;
font-size:16px;
border:none;
border-radius:30px;
background:#ff2e63;
color:white;
cursor:pointer;
}

button:hover{
background:#e61b4f;
}

video{
margin-top:30px;
width:100%;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.balloon{
position:absolute;
bottom:-150px;
width:60px;
animation:float 10s linear infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

.heart{
font-size:40px;
animation:beat 1s infinite;
margin-top:20px;
}

@keyframes beat{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

.stars{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
pointer-events:none;
}

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:.2}
to{opacity:1}
}

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<img src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png" class="balloon" style="left:10%; animation-duration:12s">
<img src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png" class="balloon" style="left:30%; animation-duration:9s">
<img src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png" class="balloon" style="left:60%; animation-duration:11s">
<img src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png" class="balloon" style="left:80%; animation-duration:10s">

<div class="container">

<h1>🎉 Happy Birthday 🎂</h1>

<h2 class="name">To Someone Special</h2>

<div class="message" id="typing"></div>

<div class="heart">❤️</div>

<button onclick="showVideo()">Open Your Birthday Surprise</button>

<div id="videoSection" style="display:none">

<h2>Your Special Video 🎥</h2>

<!-- Replace birthday-video.mp4 with your video file -->
<video controls>
<source src="video.mp4" type="video/mp4">
</video>

</div>

</div>

<!-- background music -->
<audio id="music" autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7d7c1c1f9f.mp3" type="audio/mpeg">
</audio>

<script>

const text = "I know we met recently, but I truly enjoy talking with you. You bring such a positive energy and I always look forward to our conversations. I hope this birthday brings you happiness, laughter, and many beautiful moments. I'm really glad we met. 🎈";

let i = 0;

function typeWriter(){
if(i < text.length){
document.getElementById("typing").innerHTML += text.charAt(i);
i++;
setTimeout(typeWriter,40);
}
}

typeWriter();

function showVideo(){

const music = document.getElementById("music");

music.pause();

document.getElementById("videoSection").style.display="block";

window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});

}


/* star background */
const stars = document.getElementById("stars");

for(let i=0;i<80;i++){

const s=document.createElement("div");

s.className="star";

s.style.left=Math.random()*100+"%";

s.style.top=Math.random()*100+"%";

s.style.animationDuration=(Math.random()*3+2)+"s";

stars.appendChild(s);

}

</script>

</body>
</html>
