<!DOCTYPE html>
<html>
<head>
    <title>Billas Challenge</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        button {
            padding: 12px 25px;
            margin: 15px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        #yesBtn {
            background: #28a745;
            color: white;
        }

        #noBtn {
            background: #dc3545;
            color: white;
            position: absolute;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Are you ready to handle all the "Billas"? 😏</h2>
    <button id="yesBtn" onclick="sayYes()">Yes</button>
    <button id="noBtn">No</button>
</div>

<script>
    const noBtn = document.getElementById("noBtn");

    noBtn.addEventListener("mouseover", () => {
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 50);

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    });

    function sayYes() {
        alert("Hehe, I knew you couldn’t resist the Billas charm 😉");
    }
</script>

</body>
</html>
