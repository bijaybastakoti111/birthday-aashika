<!DOCTYPE html>
<html>
<head>
    <title>Billas Challenge</title>
    <style>
        body {
            margin: 0;
            font-family: 'Comic Sans MS', cursive;
            text-align: center;
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        button {
            padding: 12px 25px;
            margin: 15px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        #yesBtn {
            background: #ff4d6d;
            color: white;
        }

        #yesBtn:hover {
            background: #ff1f4b;
        }

        #noBtn {
            background: #6c757d;
            color: white;
            position: absolute;
        }

        /* Flirty Screen */
        #flirtyScreen {
            display: none;
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            color: white;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            animation: fadeIn 1s ease-in-out;
        }

        .love-box {
            background: rgba(255,255,255,0.15);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        .heart {
            position: absolute;
            font-size: 24px;
            animation: floatUp 6s linear infinite;
        }

        @keyframes floatUp {
            from {
                transform: translateY(100vh);
                opacity: 1;
            }
            to {
                transform: translateY(-10vh);
                opacity: 0;
            }
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }
    </style>
</head>
<body>

<div class="box" id="questionBox">
    <h2>Are you ready to handle all the "Billas"? 😏</h2>
    <button id="yesBtn" onclick="sayYes()">Yes</button>
    <button id="noBtn">No</button>
</div>

<div id="flirtyScreen">
    <div class="love-box">
        <h1>Hehe… I knew it 😌</h1>
        <p>अब त तिमी आधिकारिक रूपमा</p>
        <h2>✨ Billas-approved person ✨</h2>
        <p>Warning: High charm, unlimited teasing, and occasional flirting ahead 😏</p>
        <p>Escape not possible now 💘</p>
    </div>
</div>

<!-- Background Music -->
<audio id="loveMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
    const noBtn = document.getElementById("noBtn");

    noBtn.addEventListener("mouseover", () => {
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 50);

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    });

    function sayYes() {
        document.getElementById("questionBox").style.display = "none";
        document.getElementById("flirtyScreen").style.display = "flex";

        // play music
        document.getElementById("loveMusic").play();

        // generate floating hearts
        for (let i = 0; i < 20; i++) {
            createHeart();
        }
    }

    function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";

        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (4 + Math.random() * 3) + "s";

        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 7000);
    }
</script>

</body>
</html>
