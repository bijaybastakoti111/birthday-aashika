<!DOCTYPE html>
<html>
<head>
    <title>Billas Challenge</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        button {
            padding: 12px 25px;
            margin: 15px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        #yesBtn {
            background: #28a745;
            color: white;
        }

        #noBtn {
            background: #dc3545;
            color: white;
            position: absolute;
        }

        /* Flirty screen */
        #flirtyScreen {
            display: none;
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            color: white;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-size: 28px;
            animation: fadeIn 1s ease-in-out;
        }

        .heart {
            font-size: 50px;
            animation: float 2s infinite ease-in-out;
        }

        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0); }
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }
    </style>
</head>
<body>

<div class="box" id="questionBox">
    <h2>Are you ready to handle all the "Billas"? 😏</h2>
    <button id="yesBtn" onclick="sayYes()">Yes</button>
    <button id="noBtn">No</button>
</div>

<div id="flirtyScreen">
    <div class="heart">❤️</div>
    <h1>Hehe… I knew it 😌</h1>
    <p>Now you’re officially stuck with this Billas 😏</p>
    <p>Warning: High levels of charm ahead 💘</p>
</div>

<script>
    const noBtn = document.getElementById("noBtn");

    noBtn.addEventListener("mouseover", () => {
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 50);

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    });

    function sayYes() {
        document.getElementById("questionBox").style.display = "none";
        document.getElementById("flirtyScreen").style.display = "flex";
    }
</script>

</body>
</html>
